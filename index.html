<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Studio - Mobile Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        
        /* สไตล์ช่องกรอกข้อมูล */
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            background-color: #f8fafc;
            color: #1e293b;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-field:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .label-text {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        /* ซ่อน input file ของจริง */
        input[type="file"] { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6">

    <div class="bg-white rounded-3xl shadow-xl w-full max-w-2xl overflow-hidden border border-slate-100 mb-8">
        
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 md:p-8 text-center">
            <h1 class="text-2xl md:text-3xl font-bold text-white mb-2">News Studio ⚡️</h1>
            <p class="text-blue-100 text-sm md:text-base">ระบบส่งข้อมูลภาพข่าวอัตโนมัติเข้า n8n</p>
        </div>

        <div class="p-6 md:p-8 space-y-6">
            
            <div>
                <span class="label-text text-lg">📸 1. เลือกรูปภาพข่าว (Image)</span>
                <label for="imageFile" class="flex flex-col items-center justify-center w-full h-36 border-2 border-slate-300 border-dashed rounded-2xl cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-400 transition-all">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <svg class="w-8 h-8 mb-3 text-slate-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                        </svg>
                        <p id="file-name" class="mb-1 text-sm text-slate-600 font-medium">คลิกเพื่อเลือกรูปภาพจากเครื่อง</p>
                        <p class="text-xs text-blue-500 font-medium mt-1">💡 ขนาดภาพแนะนำ 1280x720</p>
                        <p class="text-[11px] text-slate-400 mt-1">(รองรับไฟล์ JPG, PNG)</p>
                    </div>
                    <input id="imageFile" type="file" accept="image/*" onchange="updateFileName(this)" />
                </label>
            </div>

            <hr class="border-slate-100">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <div>
                    <label class="label-text">2. รูปแบบภาพ (Mode)</label>
                    <select id="imgType" class="input-field">
                        <option value="Landscape">แนวนอน (Landscape)</option>
                        <option value="Portrait">แนวตั้ง (Portrait)</option>
                    </select>
                </div>
                <div>
                    <label class="label-text">3. ตำแหน่งภาพ (Alignment)</label>
                    <select id="alignMode" class="input-field">
                        <option value="Top">ชิดบน (Top)</option>
                        <option value="Bottom">ชิดล่าง (Bottom)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <div>
                    <label class="label-text">4. ค่าการซูม (Zoom %)</label>
                    <input type="number" id="zoomText" class="input-field" value="100">
                </div>
                <div>
                    <label class="label-text flex items-baseline gap-1">
                        5. ขยับแกน Y 
                        <span class="text-xs text-blue-500 font-normal ml-1">(ใส่เครื่องหมาย - เพื่อขยับภาพขึ้น)</span>
                    </label>
                    <input type="number" id="yOffText" class="input-field" value="0">
                </div>
            </div>

            <div>
                <label class="label-text flex justify-between items-end">
                    <span>6. พาดหัวข่าว บรรทัดที่ 1 <span class="text-red-500">*</span></span>
                </label>
                <p class="text-xs text-blue-500 mb-2 mt-[-4px]">💡 หัวข้อข่าวหากยาวแนะนำตัดแยกเป็น 2 บรรทัด</p>
                <input type="text" id="n1" class="input-field text-lg font-semibold" placeholder="เช่น แมนยูบุกชนะ..." required>
            </div>

            <div>
                <label class="label-text">7. รายละเอียดข่าว บรรทัดที่ 2</label>
                <input type="text" id="n2" class="input-field" placeholder="เว้นว่างได้...">
            </div>

            <div>
                <label class="label-text">8. เลือกลีก (League)</label>
                <select id="lg" class="input-field">
                    <option value="#พรีเมียร์ลีก">#พรีเมียร์ลีก</option>
                    <option value="#เซเรีย อา">#เซเรีย อา</option>
                    <option value="#บุนเดสลีกา">#บุนเดสลีกา</option>
                    <option value="#ลาลีกา">#ลาลีกา</option>
                    <option value="#ปรีไมราลีกา">#ปรีไมราลีกา</option>
                    <option value="#ลีกเอิง">#ลีกเอิง</option>
                    <option value="#เอฟเอ คัพ">#เอฟเอ คัพ</option>
                    <option value="#เฟร้นช์ คัพ">#เฟร้นช์ คัพ</option>
                    <option value="#ทีมชาติ">#ทีมชาติ</option>
                    <option value="#แชมเปี้ยนชิพ">#แชมเปี้ยนชิพ</option>
                    <option value="#คาราบาวคัพ">#คาราบาวคัพ</option>
                    <option value="#โกปา เดล เรย์">#โกปา เดล เรย์</option>
                    <option value="#ฟุตบอลโลก">#ฟุตบอลโลก</option>
                    <option value="#โคปปา อิตาเลีย">#โคปปา อิตาเลีย</option>
                    <option value="#เดเอฟเบ โพคาล">#เดเอฟเบ โพคาล</option>
                    <option value="#เอเรดิวิซี">#เอเรดิวิซี</option>
                    <option value="#ยูฟ่า แชมเปี้ยนส์ ลีก">#ยูฟ่า แชมเปี้ยนส์ ลีก</option>
                    <option value="#สกอตติช พรีเมียร์ชิพ">#สกอตติช พรีเมียร์ชิพ</option>
                    <option value="#ซาอุดี โปรลีก">#ซาอุดี โปรลีก</option>
                    <option value="#ซูเปอร์ลีก ตุรกี">#ซูเปอร์ลีก ตุรกี</option>
                    <option value="#ยูโรเปียน ซูเปอร์ ลีก">#ยูโรเปียน ซูเปอร์ ลีก</option>
                    <option value="#ยูฟ่าเนชั่นส์ลีก">#ยูฟ่าเนชั่นส์ลีก</option>
                    <option value="#ยูโรปาลีก">#ยูโรปาลีก</option>
                    <option value="#ยูฟ่า คอนเฟอเรนซ์ ลีก">#ยูฟ่า คอนเฟอเรนซ์ ลีก</option>
                    <option value="#บราซิล ซีรี่เอ">#บราซิล ซีรี่เอ</option>
                    <option value="#เมเจอร์ลีก ซอคเกอร์">#เมเจอร์ลีก ซอคเกอร์</option>
                    <option value="#กัมเปโอนาโต มิไนโร่">กัมเปโอนาโต มิไนโร่</option>
                    <option value="#ลีกอื่น ๆ">#ลีกอื่น ๆ</option>
                    <option value="#ข่าวอื่น ๆ">#ข่าวอื่น ๆ</option>     
                </select>
            </div>

            <button onclick="sendData()" id="btn-submit" class="mt-4 w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 rounded-xl transition duration-300 shadow-lg shadow-blue-500/30 text-lg flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
                ส่งข้อมูลเข้าระบบ
            </button>

            <div id="error-msg" class="text-center text-red-500 font-medium text-sm hidden bg-red-50 p-3 rounded-lg border border-red-100">
                ❌ เชื่อมต่อไม่ได้: ตรวจสอบอุโมงค์ Cloudflare ในคอมพิวเตอร์
            </div>

            <div class="mt-8 border-t border-slate-200 pt-6">
                <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" />
                    </svg>
                    ประวัติการส่ง 5 ข่าวล่าสุด (กันลืม)
                </h3>
                <ul id="history-list" class="space-y-2">
                    </ul>
            </div>
        </div>
    </div>

    <script>
        // ทำงานทันทีเมื่อโหลดหน้าเว็บเสร็จ
        document.addEventListener('DOMContentLoaded', loadHistory);

        function updateFileName(input) {
            const fileNameDisplay = document.getElementById('file-name');
            if (input.files && input.files.length > 0) {
                fileNameDisplay.textContent = '✅ เลือกไฟล์: ' + input.files[0].name;
                fileNameDisplay.classList.replace('text-slate-600', 'text-green-600');
            } else {
                fileNameDisplay.textContent = 'คลิกเพื่อเลือกรูปภาพจากเครื่อง';
                fileNameDisplay.classList.replace('text-green-600', 'text-slate-600');
            }
        }

        // ฟังก์ชันดึงประวัติจาก LocalStorage มาแสดง
        function loadHistory() {
            const historyList = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('newsHistory') || '[]');

            if (history.length === 0) {
                historyList.innerHTML = '<li class="text-sm text-slate-400 text-center py-3 bg-slate-50 rounded-lg border border-dashed border-slate-200">ยังไม่มีประวัติการส่งข่าวครับ</li>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <li class="bg-slate-50 p-3 rounded-lg border border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="truncate pr-4">
                        <p class="text-sm font-semibold text-slate-700 truncate">${item.n1}</p>
                        <p class="text-xs text-slate-500 mt-0.5">${item.lg} • ${item.time}</p>
                    </div>
                    <span class="text-[10px] font-medium text-emerald-600 bg-emerald-100 px-2.5 py-1 rounded-full whitespace-nowrap">ส่งแล้ว</span>
                </li>
            `).join('');
        }

        // ฟังก์ชันบันทึกประวัติใหม่ลง LocalStorage
        function saveHistory(n1, lg) {
            let history = JSON.parse(localStorage.getItem('newsHistory') || '[]');
            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            
            // แทรกข่าวใหม่ไว้บนสุด
            history.unshift({ n1: n1, lg: lg, time: timeString });
            
            // เก็บไว้แค่ 5 อันล่าสุดพอ จะได้ไม่รก
            if (history.length > 5) {
                history.pop();
            }
            
            localStorage.setItem('newsHistory', JSON.stringify(history));
        }

        async function sendData() {
            const btn = document.getElementById('btn-submit');
            const errorMsg = document.getElementById('error-msg');
            const n1 = document.getElementById('n1').value;
            const lg = document.getElementById('lg').value;

            if (!n1.trim()) {
                alert('กรุณากรอกพาดหัวข่าวบรรทัดที่ 1 ด้วยครับ!');
                document.getElementById('n1').focus();
                return;
            }
            
            const formData = new FormData();
            
            const fileInput = document.getElementById('imageFile');
            if (fileInput.files.length > 0) {
                // 🛑 แก้ไขชื่อตัวแปรตรงนี้ จาก 'data' เป็น 'image' เพื่อให้ตรงกับที่ n8n รอรับครับ
                formData.append('image', fileInput.files[0]); 
            }
            
            formData.append('imgType', document.getElementById('imgType').value);
            formData.append('alignMode', document.getElementById('alignMode').value);
            formData.append('zoomText', document.getElementById('zoomText').value);
            formData.append('yOffText', document.getElementById('yOffText').value);
            formData.append('n1', n1);
            formData.append('n2', document.getElementById('n2').value);
            formData.append('lg', lg);

            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังส่งข้อมูล...`;
            errorMsg.classList.add('hidden');

            try {
                // ลิงก์ Webhook n8n ของคุณเตอร์
                const response = await fetch('https://n8n.home26.online/webhook/news-form', {
                    method: 'POST',
                    body: formData 
                });

                if (response.ok) {
                    btn.innerHTML = "✅ ส่งข้อมูลสำเร็จเรียบร้อย!";
                    btn.classList.replace('from-blue-600', 'from-emerald-500');
                    btn.classList.replace('to-indigo-600', 'to-emerald-600');
                    
                    // บันทึกประวัติก่อนที่จะรีเฟรชหน้า
                    saveHistory(n1, lg);

                    setTimeout(() => location.reload(), 2000);
                } else {
                    throw new Error("Server Error");
                }
            } catch (err) {
                errorMsg.classList.remove('hidden');
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg> ส่งข้อมูลเข้าระบบ`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
